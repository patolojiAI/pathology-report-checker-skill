name: Release skill bundle

# Build the .skill bundle and attach it to the GitHub Release whenever a vX.Y.Z
# tag is pushed. Keeps the README's releases/latest/download/... link self-maintaining.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build .skill bundle
        run: python3 .dev/scripts/build_skill.py

      - name: Attach bundle to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.skill \
            --title "$GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" dist/*.skill --clobber
